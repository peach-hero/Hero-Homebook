<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Haushaltsbuch Konten</title><style>
*{box-sizing:border-box}body{margin:0;font-family:system-ui;background:#0f0f0f;color:#f0f0f0}.tab-bar{display:flex;position:sticky;top:0;background:#1a1a1a;border-bottom:1px solid #333;overflow-x:auto;z-index:10}.tab{flex:1;min-width:92px;padding:14px 8px;text-align:center;color:#888;text-decoration:none;font-weight:700}.tab.active{color:#4da6ff;border-bottom:3px solid #4da6ff}.page{display:none;padding:12px}.page.active{display:block}.card{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:12px;padding:14px;margin-bottom:12px}.card-title{font-size:14px;font-weight:700;color:#4da6ff;margin-bottom:10px}.row-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #1a1a1a}.row-item:last-child{border-bottom:none}.row-label{font-size:13px;color:#ddd}.row-amount{font-size:13px;font-weight:700}.summary-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}.summary-item{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:10px;padding:10px;text-align:center}.label{font-size:10px;color:#888;text-transform:uppercase}.value{font-size:18px;font-weight:700}.green{color:#4caf50}.red{color:#f44336}.blue{color:#4da6ff}.year-selector{display:flex;align-items:center;justify-content:center;gap:12px;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:12px;padding:10px;margin-bottom:12px}.year-arrow,.mini-btn,.btn-save{border:none;border-radius:10px;font-weight:700}.year-arrow{width:38px;height:38px;background:#2a2a2a;color:#4da6ff;font-size:18px}.month-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px}.month-card{flex:0 0 92px;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:12px;padding:10px;cursor:pointer}.month-card.active{border-color:#4da6ff}.month-name{font-size:12px;font-weight:700;color:#ddd;margin-bottom:10px}.month-bal{font-size:16px;font-weight:700;text-align:center}.pos{color:#4caf50}.neg{color:#f44336}.mini-btn{background:#2a2a2a;color:#ddd;padding:6px 8px;font-size:11px}.add-row{display:grid;grid-template-columns:1fr 110px;gap:8px;margin-bottom:10px}.add-row input,.add-row select,.form-control{width:100%;background:#252525;border:1px solid #333;border-radius:8px;padding:11px 12px;color:#f0f0f0;font-size:13px}.btn-save{width:100%;padding:12px;background:#4da6ff;color:#000}.small{font-size:11px;color:#777}.group-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:12px;margin-bottom:10px}.group-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px}.group-title{font-weight:700}.group-drop{min-height:40px;padding:6px;border-top:1px solid #222}.account-chip{background:#252525;border:1px solid #333;border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;gap:8px}.action-row{display:flex;gap:6px;flex-wrap:wrap}.hidden{display:none}
</style></head><body>
<div class="tab-bar"><a class="tab active" href="#jahr">📅 Jahr</a><a class="tab" href="#konten">🏦 Konten</a><a class="tab" href="#eingabe">➕ Eingabe</a></div>
<div class="page active" id="jahr">
  <div class="year-selector"><button class="year-arrow" id="year-prev">‹</button><div id="year-display">2026</div><button class="year-arrow" id="year-next">›</button></div>
  <div class="summary-bar"><div class="summary-item"><div class="label">Einnahmen</div><div class="value green" id="total-inc">0,00 €</div></div><div class="summary-item"><div class="label">Ausgaben</div><div class="value red" id="total-exp">0,00 €</div></div><div class="summary-item"><div class="label">Bilanz</div><div class="value blue" id="total-bal">0,00 €</div></div></div>
  <div class="card"><div class="card-title">Monate im Jahr</div><div class="month-row" id="months"></div></div>
  <div class="card"><div class="card-title">Monatswerte</div><div id="detail"></div></div>
</div>
<div class="page" id="konten">
  <div class="card"><div class="card-title">Gruppen anlegen</div><div class="add-row"><input id="new-group" placeholder="Neue Gruppe"><button class="mini-btn" id="add-group">+ Gruppe</button></div><div class="small">Gruppen können flexibel umbenannt oder gelöscht werden.</div></div>
  <div class="card"><div class="card-title">Konten anlegen</div><div class="add-row"><input id="konto-name" placeholder="Kontoname"><select id="konto-group"></select></div><div class="add-row"><input id="konto-balance" type="number" step="0.01" placeholder="Kontostand"><button class="mini-btn" id="save-konto">Speichern</button></div></div>
  <div class="card"><div class="card-title">Gruppen & Konten</div><div id="group-list"></div></div>
</div>
<div class="page" id="eingabe"><div class="card"><div class="card-title">Eingabe</div><div class="small">Diese Version fokussiert auf Konten und Gruppen.</div></div></div>
<script>
const MONTHS=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
let currentYear=2026,currentMonth=0;
let entries=[{"type": "inc", "cat": "Otto", "amount": 3077.07, "month": 0, "year": 2026, "note": "import"}, {"type": "inc", "cat": "Otto", "amount": 3124.87, "month": 1, "year": 2026, "note": "import"}, {"type": "inc", "cat": "Otto", "amount": 3133.33, "month": 2, "year": 2026, "note": "import"}, {"type": "inc", "cat": "Matchbetting", "amount": 333.34, "month": 0, "year": 2026, "note": "import"}, {"type": "inc", "cat": "Matchbetting", "amount": 163.98, "month": 1, "year": 2026, "note": "import"}, {"type": "inc", "cat": "Matchbetting", "amount": 261.0, "month": 2, "year": 2026, "note": "import"}, {"type": "inc", "cat": "Xe Om", "amount": 498.5, "month": 0, "year": 2026, "note": "import"}, {"type": "inc", "cat": "Xe Om", "amount": 999.0, "month": 1, "year": 2026, "note": "import"}, {"type": "inc", "cat": "Xe Om", "amount": 1210.0, "month": 2, "year": 2026, "note": "import"}, {"type": "inc", "cat": "Xe Om", "amount": 550.0, "month": 3, "year": 2026, "note": "import"}, {"type": "inc", "cat": "Kleinanzeigen", "amount": 240.2, "month": 0, "year": 2026, "note": "import"}, {"type": "inc", "cat": "Kleinanzeigen", "amount": 180.0, "month": 1, "year": 2026, "note": "import"}, {"type": "inc", "cat": "Kleinanzeigen", "amount": 432.5, "month": 2, "year": 2026, "note": "import"}, {"type": "inc", "cat": "Vermietung", "amount": 165.0, "month": 0, "year": 2026, "note": "import"}, {"type": "inc", "cat": "Vermietung", "amount": 575.0, "month": 1, "year": 2026, "note": "import"}, {"type": "inc", "cat": "FEWO", "amount": 393.0, "month": 0, "year": 2026, "note": "import"}, {"type": "inc", "cat": "FEWO", "amount": 190.82, "month": 1, "year": 2026, "note": "import"}, {"type": "inc", "cat": "FEWO", "amount": 914.89, "month": 2, "year": 2026, "note": "import"}];
let accounts=[{"id": 1, "name": "C24", "balance": 106.59, "group": "bank"}, {"id": 2, "name": "BBVA", "balance": 5180.59, "group": "bank"}, {"id": 3, "name": "BARGELD", "balance": 650.0, "group": "bank"}, {"id": 4, "name": "Aktien (Scalable)", "balance": 95408.0, "group": "invest"}, {"id": 5, "name": "Zero", "balance": 112.0, "group": "invest"}, {"id": 6, "name": "Trade Republic", "balance": 3854.67, "group": "invest"}, {"id": 7, "name": "Coinbase", "balance": 11142.0, "group": "invest"}, {"id": 8, "name": "Paypal", "balance": 177.27, "group": "bank"}, {"id": 9, "name": "Paypal 2", "balance": 3.74, "group": "bank"}, {"id": 10, "name": "black", "balance": 2298.65, "group": "invest"}, {"id": 11, "name": "sharp", "balance": 80.73, "group": "invest"}, {"id": 12, "name": "Yoroi", "balance": 664.26, "group": "invest"}, {"id": 13, "name": "Uniswap", "balance": 128.14, "group": "invest"}, {"id": 14, "name": "Mexc", "balance": 110.0, "group": "invest"}, {"id": 15, "name": "Quirion", "balance": 908.74, "group": "invest"}, {"id": 16, "name": "Pionex", "balance": 993.52, "group": "invest"}, {"id": 17, "name": "Revolut 2", "balance": 0.0, "group": "bank"}, {"id": 18, "name": "Jeton", "balance": 338.7, "group": "bank"}, {"id": 19, "name": "Paysafe", "balance": 1.29, "group": "bank"}, {"id": 20, "name": "Skrill", "balance": 21.25, "group": "bank"}, {"id": 21, "name": "Revolut", "balance": 0.0, "group": "bank"}, {"id": 22, "name": "Skrill 3", "balance": 2.86, "group": "bank"}, {"id": 23, "name": "Betano", "balance": 0.0, "group": "wett"}, {"id": 24, "name": "Tipico", "balance": 0.0, "group": "wett"}, {"id": 25, "name": "Tipico 2", "balance": 0.25, "group": "wett"}, {"id": 26, "name": "Bet at Home", "balance": 0.87, "group": "wett"}, {"id": 27, "name": "Bet at Home 2", "balance": 0.0, "group": "wett"}, {"id": 28, "name": "Bet 365 2", "balance": 0.0, "group": "wett"}, {"id": 29, "name": "Xtip", "balance": 45.91, "group": "wett"}, {"id": 30, "name": "Xtip 2", "balance": 106.84, "group": "wett"}, {"id": 31, "name": "Admiralbet", "balance": 0.16, "group": "wett"}, {"id": 32, "name": "Admiralbet 2", "balance": 2.28, "group": "wett"}, {"id": 33, "name": "Neobet", "balance": 4.37, "group": "wett"}, {"id": 34, "name": "Neobet 2", "balance": 90.42, "group": "wett"}, {"id": 35, "name": "Winamax", "balance": 10.0, "group": "wett"}, {"id": 36, "name": "Winamax 2", "balance": 10.0, "group": "wett"}, {"id": 37, "name": "Winamax 3", "balance": 10.0, "group": "wett"}, {"id": 38, "name": "20 bet", "balance": 120.0, "group": "wett"}, {"id": 39, "name": "22bet", "balance": 0.65, "group": "wett"}, {"id": 40, "name": "Bet3000", "balance": 0.0, "group": "wett"}, {"id": 41, "name": "Bet3000 2", "balance": 0.0, "group": "wett"}, {"id": 42, "name": "Oddset", "balance": 0.0, "group": "wett"}, {"id": 43, "name": "Oddset 2", "balance": 0.21, "group": "wett"}, {"id": 44, "name": "Eneba", "balance": 0.0, "group": "other"}, {"id": 45, "name": "Wunschgutschein", "balance": 0.0, "group": "other"}, {"id": 46, "name": "Zinsen / Dividen", "balance": 93.01, "group": "other"}, {"id": 47, "name": "bbva", "balance": 86.66, "group": "other"}, {"id": 48, "name": "Scalable", "balance": 5.52, "group": "other"}, {"id": 49, "name": "Zero", "balance": 0.0, "group": "invest"}, {"id": 50, "name": "Trade Republic", "balance": 0.01, "group": "invest"}, {"id": 51, "name": "C24", "balance": 0.82, "group": "bank"}];
let groups=JSON.parse(localStorage.getItem('hb_groups')||JSON.stringify(['bank', 'invest', 'wett', 'other']));
if(!Array.isArray(groups) || !groups.length) groups=['bank','invest','wett','other'];
function fmt(n){return (n||0).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';}
function saveAll(){localStorage.setItem('hb_entries',JSON.stringify(entries));localStorage.setItem('hb_accounts',JSON.stringify(accounts));localStorage.setItem('hb_groups',JSON.stringify(groups));}
function openTab(h){document.querySelectorAll('.tab').forEach(a=>a.classList.toggle('active',a.getAttribute('href')==='#'+h));document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id===h));}
function mt(){let a=Array.from({length:12},()=>({inc:0,exp:0})); entries.filter(e=>e.year===currentYear).forEach(e=>a[e.month][e.type]+=e.amount); return a;}
function renderYear(){const a=mt(); const inc=a.reduce((s,x)=>s+x.inc,0), exp=a.reduce((s,x)=>s+x.exp,0); document.getElementById('year-display').textContent=currentYear; document.getElementById('total-inc').textContent=fmt(inc); document.getElementById('total-exp').textContent=fmt(exp); document.getElementById('total-bal').textContent=fmt(inc-exp); document.getElementById('months').innerHTML=MONTHS.map((m,i)=>`<div class="month-card ${i===currentMonth?'active':''}" data-m="${i}"><div class="month-name">${m}</div><div class="month-bal ${(a[i].inc-a[i].exp)>=0?'pos':'neg'}">${fmt(a[i].inc-a[i].exp)}</div></div>`).join(''); document.querySelectorAll('.month-card').forEach(el=>el.onclick=()=>{currentMonth=+el.dataset.m; renderDetail(); renderYear();});}
function renderDetail(){const a=mt()[currentMonth]; document.getElementById('detail').innerHTML=`<div class="row-item"><span class="row-label">Einnahmen</span><span class="row-amount green">${fmt(a.inc)}</span></div><div class="row-item"><span class="row-label">Ausgaben</span><span class="row-amount red">${fmt(a.exp)}</span></div><div class="row-item"><span class="row-label">Bilanz</span><span class="row-amount blue">${fmt(a.inc-a.exp)}</span></div>`;}
function ensureGroupList(){if(!groups.includes('other')) groups.push('other');}
function syncGroups(){ensureGroupList(); let map={}; groups.forEach(g=>map[g]=[]); accounts.forEach(a=>{if(!map[a.group]) map[a.group]=[]; map[a.group].push(a)}); return map;}
function renderGroupOptions(){ensureGroupList(); document.getElementById('konto-group').innerHTML=groups.map(g=>`<option value="${g}">${g}</option>`).join('');}
function renderKonten(){renderGroupOptions(); const map=syncGroups(); document.getElementById('group-list').innerHTML=groups.map(g=>`<div class="group-card"><div class="group-head"><div class="group-title">${g}</div><div class="action-row"><button class="mini-btn" data-rename="${g}">Umbenennen</button><button class="mini-btn" data-delgroup="${g}">Löschen</button></div></div><div class="group-drop">${(map[g]||[]).map(a=>`<div class="account-chip"><div><div class="row-label">${a.name}</div><div class="small">${fmt(a.balance||0)}</div></div><div class="action-row"><button class="mini-btn" data-edit="${a.id}">✏️</button><button class="mini-btn" data-move="${a.id}">↔</button><button class="mini-btn" data-del="${a.id}">🗑️</button></div></div>`).join('')||'<div class="small">Keine Konten</div>'}</div></div>`).join('');
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{const a=accounts.find(x=>String(x.id)===b.dataset.edit); if(!a) return; const n=prompt('Kontoname',a.name); if(n!==null) a.name=n.trim()||a.name; const bal=prompt('Kontostand',String(a.balance||0)); if(bal!==null) a.balance=parseFloat(bal)||0; renderAll();});
  document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{accounts=accounts.filter(x=>String(x.id)!==b.dataset.del); renderAll();});
  document.querySelectorAll('[data-move]').forEach(b=>b.onclick=()=>{const a=accounts.find(x=>String(x.id)===b.dataset.move); if(!a) return; const target=prompt('Neue Gruppe',a.group||'other'); if(!target) return; if(!groups.includes(target)) groups.push(target); a.group=target; renderAll();});
  document.querySelectorAll('[data-rename]').forEach(b=>b.onclick=()=>{const old=b.dataset.rename; const neu=prompt('Neue Gruppenbezeichnung',old); if(!neu||neu===old) return; groups=groups.map(g=>g===old?neu:g); accounts.forEach(a=>{if(a.group===old) a.group=neu;}); renderAll();});
  document.querySelectorAll('[data-delgroup]').forEach(b=>b.onclick=()=>{const g=b.dataset.delgroup; if(!confirm('Gruppe löschen?')) return; groups=groups.filter(x=>x!==g); accounts.forEach(a=>{if(a.group===g) a.group='other';}); if(!groups.includes('other')) groups.push('other'); renderAll();});}
function renderAll(){renderYear(); renderDetail(); renderKonten(); saveAll();}
document.addEventListener('DOMContentLoaded',()=>{document.querySelectorAll('.tab').forEach(a=>a.onclick=e=>{e.preventDefault(); openTab(a.getAttribute('href').slice(1));}); document.getElementById('year-prev').onclick=()=>{currentYear--; renderAll();}; document.getElementById('year-next').onclick=()=>{currentYear++; renderAll();}; document.getElementById('save-konto').onclick=()=>{const name=document.getElementById('konto-name').value.trim(); const group=document.getElementById('konto-group').value; const balance=parseFloat(document.getElementById('konto-balance').value)||0; if(!name) return; accounts.unshift({id:Date.now(),name,balance,group}); document.getElementById('konto-name').value=''; document.getElementById('konto-balance').value=''; renderAll();}; document.getElementById('add-group').onclick=()=>{const g=document.getElementById('new-group').value.trim(); if(!g) return; if(!groups.includes(g)) groups.push(g); document.getElementById('new-group').value=''; renderAll();}; renderAll();});
</script></body></html>
