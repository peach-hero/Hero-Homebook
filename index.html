function renderInputs(){document.getElementById('month').innerHTML=Array.from({length:12},(_,i)=>`<option value="${i}">${['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'][i]}</option>`).join(''); document.getElementById('zd-month').innerHTML=document.getElementById('month').innerHTML; document.getElementById('month').value=currentMonth; document.getElementById('zd-month').value=currentMonth; const t=document.getElementById('type-select').value; document.getElementById('cat').innerHTML=(t==='inc'?INC:EXP).map(x=>`<option>${x}</option>`).join('');}
function renderAll(){renderYear(); renderMonths(); renderDash(); renderDetail(); renderKonten(); renderZd(); renderInputs(); saveAll();}
document.addEventListener('DOMContentLoaded',()=>{document.querySelectorAll('.tab').forEach(a=>a.onclick=e=>{e.preventDefault(); openTab(a.getAttribute('href').slice(1));}); document.getElementById('year-prev').onclick=()=>{currentYear--; renderAll();}; document.getElementById('year-next').onclick=()=>{currentYear++; renderAll();}; document.getElementById('type-select').onchange=renderInputs; document.getElementById('save').onclick=()=>{const type=document.getElementById('type-select').value, cat=document.getElementById('cat').value.trim(), amount=parseFloat(document.getElementById('amount').value), month=parseInt(document.getElementById('month').value), note=document.getElementById('note').value.trim(); if(!cat||isNaN(amount)||amount<=0) return; entries.unshift({type,cat,amount,month,year:currentYear,note}); renderAll();}; document.getElementById('zd-add').onclick=()=>{const type=document.getElementById('zd-type').value, source=document.getElementById('zd-source').value.trim(), amount=parseFloat(document.getElementById('zd-amount').value), month=parseInt(document.getElementById('zd-month').value); if(!source||isNaN(amount)||amount<=0) return; zdEntries.unshift({type,source,amount,month,year:currentYear}); renderAll();}; renderAll(); });
</script></body></html>
